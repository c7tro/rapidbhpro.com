<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAPID BH PRO | صمم بوكسك</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        :root { --primary: #e63946; --gold: #c5a028; --dark: #0a0a0a; --glass: rgba(15, 15, 15, 0.98); }
        body { font-family: 'Tajawal', sans-serif; background-color: #000; color: #fff; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        
        /* --- Hero --- */
        .hero-section {
            height: 100vh; width: 100%; position: relative;
            background-image: linear-gradient(to bottom, rgba(0,0,0,0.6), rgba(0,0,0,0.9)), url('https://i.ibb.co/9kCQjSsy/IMG-7517.jpg');
            background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; text-align: center;
        }

        /* --- Customizer Modal --- */
        #customizer-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 30000; overflow-y: auto; }
        .selection-card { background: #111; border: 1px solid #222; border-radius: 20px; padding: 15px; display: flex; align-items: center; justify-content: space-between; }
        
        .nav-glass { background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(15px); }
        .side-panel { position: fixed; top: 0; height: 100vh; width: 350px; background: var(--glass); z-index: 10000; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        #cart-panel { right: -400px; border-left: 2px solid var(--primary); }
        .active-right { right: 0 !important; }

        .product-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 30px; overflow: hidden; transition: 0.3s; }
        .btn-premium { background: linear-gradient(45deg, var(--primary), #b91c1c); box-shadow: 0 10px 20px rgba(230, 57, 70, 0.2); }
        
        .counter-badge { background: var(--primary); color: white; padding: 2px 8px; border-radius: 10px; font-size: 12px; }
        
        #lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 40000; align-items: center; justify-content: center; padding: 20px; }
        #lightbox img { max-width: 100%; max-height: 80vh; border-radius: 15px; border: 2px solid var(--gold); }

        @media (max-width: 768px) { .side-panel { width: 85% !important; } }
    </style>
</head>
<body>

<div id="master-overlay" class="fixed inset-0 bg-black/80 hidden z-[9999]" onclick="closePanels()"></div>

<nav class="fixed top-0 w-full z-[1000] py-6 px-6 transition-all" id="nav">
    <div class="max-w-7xl mx-auto flex justify-between items-center text-white">
        <div class="text-xl font-black italic">RAPID <span class="text-red-600">BH PRO</span></div>
        <button onclick="openCart()" class="relative p-2">
            <i class="fas fa-shopping-bag text-3xl"></i>
            <span id="cart-dot" class="absolute top-0 right-0 bg-red-600 w-5 h-5 rounded-full text-[10px] flex items-center justify-center font-bold">0</span>
        </button>
    </div>
</nav>

<section id="hero" class="hero-section">
    <div class="bg-black/40 p-10 rounded-[50px] backdrop-blur-sm border border-white/5 animate__animated animate__fadeIn">
        <h1 class="text-6xl md:text-8xl font-black italic mb-6">RAPID <span class="text-red-600">PRO</span></h1>
        <p class="text-gold font-bold tracking-[5px] mb-8 uppercase text-sm">Best Quality in UAE</p>
        <button onclick="document.getElementById('store').scrollIntoView({behavior:'smooth'})" class="btn-premium px-12 py-5 rounded-full font-black text-xl">اطلب الآن</button>
    </div>
</section>

<section id="store" class="py-24 px-6">
    <div class="max-w-7xl mx-auto">
        <h2 class="text-4xl font-black italic mb-16 text-center">المتجر</h2>
        <div id="p-grid" class="grid grid-cols-1 md:grid-cols-3 gap-8 text-white"></div>
    </div>
</section>

<div id="customizer-modal">
    <div class="max-w-2xl mx-auto p-6 min-h-screen flex flex-col">
        <div class="flex justify-between items-center mb-10 pt-10">
            <h2 class="text-3xl font-black italic text-red-600">صمم بوكس الـ 12 حبة</h2>
            <button onclick="closeCustomizer()" class="text-4xl">&times;</button>
        </div>
        
        <div class="bg-zinc-900 p-6 rounded-3xl mb-8 border border-gold/30">
            <div class="flex justify-between items-center">
                <span class="text-xl font-bold">القطع المختارة:</span>
                <span id="box-progress" class="text-3xl font-black text-gold italic">0 / 12</span>
            </div>
            <div class="w-full bg-black h-2 mt-4 rounded-full overflow-hidden">
                <div id="progress-bar" class="bg-gold h-full transition-all" style="width: 0%"></div>
            </div>
        </div>

        <div id="custom-options" class="space-y-4 mb-10 flex-1">
            </div>

        <div class="sticky bottom-6 left-0 right-0 p-4 bg-black/80 backdrop-blur rounded-3xl border border-white/10">
            <button id="add-box-btn" disabled onclick="finalAddBox()" class="w-full py-6 rounded-2xl font-black text-2xl opacity-50 bg-gray-600 transition">إضافة البوكس للسلة (150 AED)</button>
        </div>
    </div>
</div>

<aside id="cart-panel" class="side-panel flex flex-col">
    <div class="p-8 border-b border-white/5 flex justify-between items-center">
        <h2 class="text-2xl font-black italic text-white">السلة</h2>
        <button onclick="closePanels()" class="text-4xl text-white">&times;</button>
    </div>
    <div id="cart-items-box" class="flex-1 overflow-y-auto p-4 space-y-4 text-white"></div>
    <div class="p-8 bg-black border-t border-white/10 text-white">
        <div class="flex justify-between text-2xl font-black mb-6"><span>الإجمالي:</span><span id="total-price" class="text-gold">0 AED</span></div>
        <button onclick="showCheckout()" class="w-full btn-premium py-5 rounded-2xl font-black text-xl">إرسال الطلب</button>
    </div>
</aside>

<div id="checkout-modal" class="fixed inset-0 z-[50000] bg-black hidden items-center justify-center p-4">
    <div class="bg-zinc-900 w-full max-w-xl rounded-[40px] p-10 relative">
        <button onclick="closeCheckout()" class="absolute top-8 right-8 text-3xl text-white">&times;</button>
        <h2 class="text-3xl font-black mb-8 text-red-600 text-center">بيانات التوصيل</h2>
        <form onsubmit="handleFinalSubmit(event)" class="space-y-6">
            <input type="text" id="c-name" placeholder="الاسم" class="w-full bg-black border border-white/10 p-5 rounded-2xl outline-none text-white focus:border-red-600" required>
            <input type="tel" id="c-phone" placeholder="رقم الهاتف" class="w-full bg-black border border-white/10 p-5 rounded-2xl outline-none text-white focus:border-red-600" required>
            <select id="c-city" class="w-full bg-black border border-white/10 p-5 rounded-2xl outline-none text-white">
                <option>أبوظبي</option><option>دبي</option><option>الشارقة</option><option>عجمان</option><option>رأس الخيمة</option><option>الفجيرة</option>
            </select>
            <div id="summary-final" class="bg-black p-4 rounded-xl text-xs text-gray-500 overflow-y-auto max-h-40"></div>
            <button type="submit" class="w-full btn-premium py-6 rounded-2xl font-black text-xl text-white">تأكيد عبر واتساب</button>
        </form>
    </div>
</div>

<footer class="bg-black py-20 px-6 border-t border-white/5 text-center text-white">
    <h2 class="text-2xl font-black italic mb-6 text-red-600">RAPID BH PRO</h2>
    <p class="text-sm font-bold mb-4">971508851549+ | info@rapidbhpro.com</p>
    <p class="text-[10px] text-gray-700 tracking-[8px]">UAE PREMIER FRAGRANCE</p>
</footer>

<script>
    const ITEMS = [
        { id: 1, name: "عطر عود ملكي", price: 15, img: "https://i.ibb.co/9mSytFrM/IMG-7278.jpg" },
        { id: 2, name: "عطر الفخامة", price: 15, img: "https://i.ibb.co/YF8sD3p2/IMG-7285.jpg" },
        { id: 3, name: "عطر زهور بيضاء", price: 15, img: "https://i.ibb.co/V0nJW4CY/IMG-7280.jpg" },
        { id: 4, name: "عطر فواكه", price: 15, img: "https://i.ibb.co/Y7B86C54/IMG-7279.jpg" },
        { id: 5, name: "مزيل بقع BH 99", price: 15, img: "https://i.ibb.co/3mcb1trt/IMG-7284.jpg" },
        { id: 6, name: "قاهر الدهون", price: 15, img: "https://i.ibb.co/KzxfrNkC/IMG-7281.jpg" }
    ];

    const BOX_PRICE = 150;
    let cart = JSON.parse(localStorage.getItem('RAPID_PRO_V6')) || [];
    let currentBoxSelection = {};

    function init() {
        const grid = document.getElementById('p-grid');
        // Render normal items
        let html = ITEMS.map(p => `
            <div class="product-card group animate__animated animate__fadeInUp">
                <div class="h-72 overflow-hidden" onclick="showImg('${p.img}')"><img src="${p.img}" class="w-full h-full object-cover transition duration-500 group-hover:scale-110"></div>
                <div class="p-6">
                    <h3 class="text-xl font-bold mb-4">${p.name}</h3>
                    <div class="flex justify-between items-center">
                        <span class="text-2xl font-black text-gold">${p.price} AED</span>
                        <button onclick="addToCart(${p.id})" class="w-12 h-12 bg-white text-black rounded-xl flex items-center justify-center hover:bg-red-600 hover:text-white transition"><i class="fas fa-plus"></i></button>
                    </div>
                </div>
            </div>
        `).join('');
        
        // Add Special Box
        html += `
            <div class="product-card border-2 border-gold/50 animate__animated animate__fadeInUp" style="background: linear-gradient(to bottom, #111, #000);">
                <div class="h-72 relative" onclick="showImg('https://i.ibb.co/9kCQjSsy/IMG-7517.jpg')">
                    <img src="https://i.ibb.co/9kCQjSsy/IMG-7517.jpg" class="w-full h-full object-cover">
                    <div class="absolute top-4 right-4 bg-gold text-black font-black px-4 py-1 rounded-full text-xs">عرض 12 بسعر 10 🔥</div>
                </div>
                <div class="p-6">
                    <h3 class="text-xl font-black text-gold mb-2">بوكس التوفير الملكي</h3>
                    <p class="text-xs text-gray-500 mb-6 italic">اختر 12 قطعة من ذوقك بخصم خاص</p>
                    <div class="flex justify-between items-center">
                        <span class="text-2xl font-black text-white">${BOX_PRICE} AED</span>
                        <button onclick="openCustomizer()" class="bg-gold text-black px-6 py-3 rounded-xl font-black hover:bg-white transition">صمم بوكسك</button>
                    </div>
                </div>
            </div>
        `;
        grid.innerHTML = html;
        updateUI();
        window.onscroll = () => { if(window.scrollY > 50) document.getElementById('nav').classList.add('nav-glass'); else document.getElementById('nav').classList.remove('nav-glass'); };
    }

    // --- Box Customizer Logic ---
    function openCustomizer() {
        document.getElementById('customizer-modal').style.display = 'block';
        currentBoxSelection = {};
        ITEMS.forEach(i => currentBoxSelection[i.id] = 0);
        renderOptions();
        updateBoxProgress();
    }

    function renderOptions() {
        const box = document.getElementById('custom-options');
        box.innerHTML = ITEMS.map(p => `
            <div class="selection-card animate__animated animate__fadeInRight">
                <div class="flex items-center gap-4">
                    <img src="${p.img}" class="w-16 h-16 rounded-xl object-cover">
                    <span class="font-bold">${p.name}</span>
                </div>
                <div class="flex items-center gap-6 bg-black p-2 rounded-2xl border border-white/5">
                    <button onclick="updateSelection(${p.id}, -1)" class="w-8 h-8 text-xl">-</button>
                    <span class="text-gold font-black w-4 text-center">${currentBoxSelection[p.id]}</span>
                    <button onclick="updateSelection(${p.id}, 1)" class="w-8 h-8 text-xl text-red-600">+</button>
                </div>
            </div>
        `).join('');
    }

    function updateSelection(id, delta) {
        const total = Object.values(currentBoxSelection).reduce((a, b) => a + b, 0);
        if(delta > 0 && total >= 12) return;
        if(delta < 0 && currentBoxSelection[id] <= 0) return;
        currentBoxSelection[id] += delta;
        renderOptions();
        updateBoxProgress();
        if(navigator.vibrate) navigator.vibrate(5);
    }

    function updateBoxProgress() {
        const total = Object.values(currentBoxSelection).reduce((a, b) => a + b, 0);
        document.getElementById('box-progress').innerText = `${total} / 12`;
        document.getElementById('progress-bar').style.width = `${(total / 12) * 100}%`;
        
        const btn = document.getElementById('add-box-btn');
        if(total === 12) {
            btn.disabled = false;
            btn.classList.replace('bg-gray-600', 'btn-premium');
            btn.classList.remove('opacity-50');
        } else {
            btn.disabled = true;
            btn.classList.add('opacity-50');
        }
    }

    function finalAddBox() {
        let details = [];
        ITEMS.forEach(i => { if(currentBoxSelection[i.id] > 0) details.push(`${i.name} (${currentBoxSelection[i.id]} حبة)`); });
        
        cart.push({
            id: 'box_' + Date.now(),
            name: "بوكس التوفير الملكي (مخصص)",
            price: BOX_PRICE,
            img: "https://i.ibb.co/9kCQjSsy/IMG-7517.jpg",
            qty: 1,
            isBox: true,
            boxDetails: details.join(', ')
        });
        save(); updateUI(); closeCustomizer(); toast("تمت إضافة البوكس المخصص للسلة");
    }

    function closeCustomizer() { document.getElementById('customizer-modal').style.display = 'none'; }

    // --- Cart Logic ---
    function addToCart(id) {
        const p = ITEMS.find(x => x.id === id);
        const exists = cart.find(x => x.id === id);
        if(exists) exists.qty++; else cart.push({...p, qty: 1});
        save(); updateUI(); toast(`تمت إضافة ${p.name}`);
    }

    function renderCart() {
        const box = document.getElementById('cart-items-box');
        let total = 0;
        if(cart.length === 0) box.innerHTML = `<p class="text-center py-20 opacity-20 italic">السلة فارغة</p>`;
        else {
            box.innerHTML = cart.map((i, idx) => {
                total += (i.price * i.qty);
                return `<div class="bg-zinc-900 p-4 rounded-3xl border border-white/5 animate__animated animate__fadeInRight">
                    <div class="flex gap-4">
                        <img src="${i.img}" class="w-16 h-16 rounded-xl object-cover">
                        <div class="flex-1">
                            <h4 class="font-bold text-sm">${i.name}</h4>
                            ${i.isBox ? `<p class="text-[10px] text-gold mt-1">${i.boxDetails}</p>` : ''}
                            <div class="flex justify-between items-center mt-3">
                                <div class="flex gap-4 bg-black px-3 py-1 rounded-lg">
                                    <span onclick="changeQty(${idx}, -1)" class="cursor-pointer">-</span>
                                    <span class="text-red-600 font-bold">${i.qty}</span>
                                    <span onclick="changeQty(${idx}, 1)" class="cursor-pointer">+</span>
                                </div>
                                <span class="font-bold text-gold">${i.price * i.qty} AED</span>
                            </div>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }
        document.getElementById('total-price').innerText = `${total} AED`;
    }

    function changeQty(idx, d) { cart[idx].qty += d; if(cart[idx].qty <= 0) cart.splice(idx, 1); save(); updateUI(); renderCart(); }
    function save() { localStorage.setItem('RAPID_PRO_V6', JSON.stringify(cart)); }
    function updateUI() { document.getElementById('cart-dot').innerText = cart.reduce((a, b) => a + b.qty, 0); }
    function openCart() { document.getElementById('cart-panel').classList.add('active-right'); document.getElementById('master-overlay').classList.remove('hidden'); renderCart(); }
    function closePanels() { document.getElementById('cart-panel').classList.remove('active-right'); document.getElementById('master-overlay').classList.add('hidden'); }
    function showCheckout() { if(cart.length === 0) return; document.getElementById('checkout-modal').style.display = 'flex'; renderSummary(); }
    function closeCheckout() { document.getElementById('checkout-modal').style.display = 'none'; }
    function renderSummary() {
        let total = 0;
        document.getElementById('summary-final').innerHTML = cart.map(i => {
            total += (i.price * i.qty);
            return `<div class="mb-2">● ${i.name} ${i.isBox ? `[${i.boxDetails}]` : ''} x ${i.qty} = ${i.price*i.qty} AED</div>`;
        }).join('') + `<div class="mt-4 text-white font-black text-lg">المجموع: ${total} AED</div>`;
    }

    function handleFinalSubmit(e) {
        e.preventDefault();
        const n = document.getElementById('c-name').value, p = document.getElementById('c-phone').value, c = document.getElementById('c-city').value;
        let m = `طلب جديد لبراند RAPID PRO UAE 🇦🇪\n\n👤 الاسم: ${n}\n📞 الهاتف: ${p}\n📍 المدينة: ${c}\n\n🛒 السلة:\n`;
        let total = 0;
        cart.forEach(i => {
            m += `- ${i.name} x ${i.qty} = ${i.price * i.qty} AED\n`;
            if(i.isBox) m += `   └ التشكيلة: ${i.boxDetails}\n`;
            total += (i.price * i.qty);
        });
        m += `\n💰 المجموع النهائي: ${total} درهم إماراتي`;
        window.open(`https://wa.me/971508851549?text=${encodeURIComponent(m)}`, '_blank');
        cart = []; save(); location.reload();
    }

    function toast(m) { const t = document.createElement('div'); t.className = "fixed bottom-5 left-5 bg-white text-black px-6 py-3 rounded-xl font-bold z-[60000] animate__animated animate__fadeInUp"; t.innerText = m; document.body.appendChild(t); setTimeout(() => t.remove(), 2500); }
    function showImg(src) { 
        const lb = document.createElement('div'); 
        lb.id = "lightbox"; lb.style.display = "flex"; 
        lb.innerHTML = `<button onclick="this.parentElement.remove()" class="absolute top-10 right-10 text-5xl text-white">&times;</button><img src="${src}" class="animate__animated animate__zoomIn">`;
        document.body.appendChild(lb);
    }

    init();
</script>
</body>
</html>
