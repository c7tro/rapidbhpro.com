<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAPID BH PRO | المتجر الرسمي الشامل</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        /* --- Root Variables & Base Styles --- */
        :root {
            --primary: #e63946;
            --gold: #c5a028;
            --dark: #000000;
            --zinc-dark: #09090b;
            --card: #0f0f11;
            --glass: rgba(10, 10, 10, 0.9);
            --transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            --text-color: #ffffff;
            --text-muted: #9ca3af;
            --border-color: rgba(255,255,255,0.05);
            
            --fb-bg: #18191a;
            --fb-bubble: #242526;
            --fb-pop: #3a3b3c;
            --fb-text: #e4e6eb;
            --fb-gray: #b0b3b8;
        }

        /* === LIGHT MODE === */
        body.light-mode {
            --dark: #f0f0f0;
            --zinc-dark: #e5e5e5;
            --card: #ffffff;
            --glass: rgba(255, 255, 255, 0.95);
            --text-color: #111111;
            --text-muted: #555555;
            --border-color: rgba(0,0,0,0.08);
            --fb-bg: #f0f2f5;
            --fb-bubble: #e4e6eb;
            --fb-pop: #d8dadf;
            --fb-text: #1c1e21;
            --fb-gray: #65676b;
            background-color: #f5f5f7;
            color: #111111;
        }

        body.light-mode nav { background: rgba(255,255,255,0.08) !important; }
        body.light-mode .glass-nav { background: rgba(255,255,255,0.15) !important; backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.15) !important; }
        body.light-mode nav .text-gray-400 { color: rgba(255,255,255,0.7) !important; }
        body.light-mode nav .lang-btn { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.3); color: #fff; }
        body.light-mode nav .fas, body.light-mode nav .fab { color: #fff; }
        body.light-mode #sidebar, body.light-mode #cart-panel { background: rgba(255,255,255,0.98); }
        body.light-mode .product-card { background: #fff; border-color: #e5e7eb; box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
        body.light-mode .product-card:hover { box-shadow: 0 20px 40px rgba(230,57,70,0.12); }
        body.light-mode .image-box { background: #f3f4f6; }
        body.light-mode #reviews { background: #f0f0f0; }
        body.light-mode .fb-comments-section { border-color: rgba(0,0,0,0.08); }
        body.light-mode .fb-comment-bubble { background: #e4e6eb; }
        body.light-mode input, body.light-mode textarea, body.light-mode select { background: #fff !important; border-color: #d1d5db !important; color: #111 !important; }
        body.light-mode input::placeholder, body.light-mode textarea::placeholder { color: #9ca3af; }
        body.light-mode #checkout-modal > div { background: #fff; }
        body.light-mode #box-modal > div { background: #fff; }
        body.light-mode .bg-white\/5 { background: rgba(0,0,0,0.04) !important; }
        body.light-mode .bg-black\/40 { background: rgba(0,0,0,0.06) !important; }
        body.light-mode .bg-black\/30 { background: rgba(0,0,0,0.03) !important; }
        body.light-mode .bg-black\/50 { background: rgba(0,0,0,0.05) !important; }
        body.light-mode .bg-black\/60 { background: rgba(255,255,255,0.85) !important; }
        body.light-mode .bg-black\/80 { background: rgba(240,240,240,0.95) !important; }
        body.light-mode .text-gray-400 { color: #6b7280 !important; }
        body.light-mode .text-gray-500 { color: #6b7280 !important; }
        body.light-mode .text-gray-600 { color: #9ca3af !important; }
        body.light-mode .border-white\/5 { border-color: rgba(0,0,0,0.07) !important; }
        body.light-mode .border-white\/10 { border-color: rgba(0,0,0,0.1) !important; }
        body.light-mode footer { background: #fff; border-color: rgba(0,0,0,0.08); }
        body.light-mode .bg-zinc-950 { background: #ebebeb !important; }
        body.light-mode .bg-zinc-900 { background: #f9f9f9 !important; }
        body.light-mode .bg-zinc-800 { background: #e5e5e5 !important; }
        body.light-mode .text-white { color: #111111 !important; }
        body.light-mode h1, body.light-mode h2, body.light-mode h3, body.light-mode h4 { color: #111111; }
        body.light-mode .hero-bg {
            background-image: linear-gradient(to bottom, rgba(0,0,0,0.15), rgba(0,0,0,0.7)), 
                              url('https://i.ibb.co/4RYyzcXY/IMG-8023.jpg') !important;
            background-position: center center !important;
        }
        body.light-mode #master-overlay { background: rgba(0,0,0,0.5) !important; }
        body.light-mode .lang-btn { background: rgba(0,0,0,0.06); border-color: rgba(0,0,0,0.12); color: #111; }

        /* Theme Toggle Button */
        #theme-toggle {
            position: relative;
            width: 52px;
            height: 28px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            overflow: hidden;
            flex-shrink: 0;
        }

        #theme-toggle:hover {
            border-color: var(--gold);
            box-shadow: 0 0 15px rgba(197,160,40,0.25);
            transform: scale(1.08);
        }

        .theme-icon-wrap {
            position: relative;
            width: 22px;
            height: 22px;
        }

        .icon-moon, .icon-sun {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .icon-moon { opacity: 1; transform: rotate(0deg) scale(1); color: #c5a028; }
        .icon-sun  { opacity: 0; transform: rotate(90deg) scale(0.4); color: #f59e0b; }

        body.light-mode #theme-toggle {
            background: rgba(0,0,0,0.06);
            border-color: rgba(0,0,0,0.15);
        }
        body.light-mode .icon-moon { opacity: 0; transform: rotate(-90deg) scale(0.4); }
        body.light-mode .icon-sun  { opacity: 1; transform: rotate(0deg) scale(1); }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--dark);
            color: #ffffff;
            overflow-x: hidden;
            line-height: 1.6;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--dark); }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

        .glass-nav {
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(230, 57, 70, 0.1);
            padding: 1.2rem 2.5rem !important;
        }

        .hero-section {
            position: relative;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: #000;
        }

        .hero-bg {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,1)), 
                              url('https://i.ibb.co/9kCQjSsy/IMG-7517.jpg');
            background-size: cover;
            background-position: center 30%;
            z-index: 1;
            transform: scale(1.05);
            animation: heroZoom 10s infinite alternate;
        }
        @keyframes heroZoom { from { transform: scale(1.05); } to { transform: scale(1.1); } }

        .side-panel {
            position: fixed;
            top: 0;
            height: 100vh;
            width: 420px;
            max-width: 85vw;
            background: var(--glass);
            backdrop-filter: blur(40px);
            z-index: 5000;
            transition: var(--transition);
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        #sidebar { left: -450px; border-right: 1px solid rgba(197, 160, 40, 0.3); }
        #cart-panel { right: -450px; border-left: 1px solid rgba(230, 57, 70, 0.3); }

        .side-panel.active-left { left: 0 !important; }
        .side-panel.active-right { right: 0 !important; }

        html[lang="en"] #sidebar { left: auto; right: -450px; }
        html[lang="en"] #cart-panel { right: auto; left: -450px; }

        .product-card {
            background: var(--card);
            border: 1px solid #1f1f23;
            border-radius: 40px;
            overflow: hidden;
            transition: var(--transition);
        }

        .product-card:hover {
            transform: translateY(-15px) scale(1.02);
            border-color: var(--primary);
            box-shadow: 0 20px 40px rgba(230, 57, 70, 0.15);
        }

        .image-box {
            position: relative;
            height: 380px;
            margin: 15px;
            border-radius: 30px;
            overflow: hidden;
            cursor: zoom-in;
            background: #151518;
        }

        .image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 1s ease;
        }

        /* --- PRICE BADGE ON IMAGE --- */
        .price-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            padding: 8px 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-weight: 900;
            color: var(--primary);
            z-index: 10;
        }

        .btn-premium {
            background: linear-gradient(135deg, var(--primary) 0%, #9b1c1c 100%);
            color: white;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: var(--transition);
            box-shadow: 0 10px 20px rgba(230, 57, 70, 0.3);
        }

        .btn-premium:hover {
            filter: brightness(1.2);
            box-shadow: 0 15px 30px rgba(230, 57, 70, 0.5);
            transform: translateY(-2px);
        }

        .fb-comments-section {
            background-color: var(--dark);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .fb-comment-bubble {
            background-color: var(--fb-bubble);
            padding: 12px 18px;
            border-radius: 20px;
            max-width: 90%;
        }

        .fb-action-btn {
            color: var(--fb-gray);
            font-weight: bold;
            font-size: 13px;
            margin-right: 12px;
            cursor: pointer;
        }

        .box-icon-container {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            background: linear-gradient(135deg, #1a1a1c 0%, #0a0a0a 100%);
            color: var(--primary);
            font-size: 100px;
        }
    </style>
</head>
<body>

<script>
    const SUPABASE_URL = 'https://wmbozoabyhoszrukkoek.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_ICgREpxCsbDTgmBgSycvTA_mnaxkVge';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const PRODUCTS = [
        { id: 1, name: "معطر عود ملكي", nameEn: "Royal Oud", price: 15, img: "https://i.ibb.co/9mSytFrM/IMG-7278.jpg", info: "ثبات عالي للأقمشة والفرش." },
        { id: 2, name: "معطر عطور عربية", nameEn: "Luxury Fragrance", price: 15, img: "https://i.ibb.co/YF8sD3p2/IMG-7285.jpg", info: "رائحة تدوم لأيام بتركيز عالي." },
        { id: 3, name: "معطر زهور بيضاء", nameEn: "White Flowers", price: 15, img: "https://i.ibb.co/V0nJW4CY/IMG-7280.jpg", info: "انتعاش الزهور الطبيعية." },
        { id: 4, name: "معطر فواكه إستوائية", nameEn: "Fresh Fruits", price: 15, img: "https://i.ibb.co/Y7B86C54/IMG-7279.jpg", info: "مزيج فواكه صيفية منعشة." },
        { id: 5, name: "مزيل البقع الصعبة", nameEn: "Stain Remover", price: 15, img: "https://i.ibb.co/3mcb1trt/IMG-7284.jpg", info: "لإزالة أصعب البقع من الأقمشة." },
        { id: 6, name: "مزيل الدهون", nameEn: "Grease Killer", price: 15, img: "https://i.ibb.co/KzxfrNkC/IMG-7281.jpg", info: "قوة مضاعفة لإزالة الشحوم." },
        { id: 7, name: "بوكس التوفير (12 عبوة)", nameEn: "Mega Box (12 Pack)", price: 150, isBox: true, info: "صمم بوكسك الخاص ووفر 30 درهم." }
    ];

    let state = { lang: 'ar', cart: JSON.parse(localStorage.getItem('rapid_pro_cart')) || [], boxSelection: {}, comments: [] };

    function init() {
        renderProducts();
        fetchComments();
        updateUI();
    }

    async function fetchComments() {
        const { data } = await supabaseClient.from('comments').select('*').order('created_at', { ascending: false });
        if (data) { state.comments = data; renderFBComments(); }
    }

    async function postComment() {
        const name = document.getElementById('reviewer-name').value;
        const text = document.getElementById('reviewer-text').value;
        const img = document.getElementById('reviewer-image').value;
        if (!name || !text) return;

        const { error } = await supabaseClient.from('comments').insert([{ name, text, image_url: img, created_at: new Date() }]);
        if (!error) {
            document.getElementById('reviewer-name').value = '';
            document.getElementById('reviewer-text').value = '';
            document.getElementById('reviewer-image').value = '';
            fetchComments();
        }
    }

    function renderFBComments() {
        const list = document.getElementById('fb-comment-list');
        list.innerHTML = state.comments.map(c => `
            <div class="flex gap-4">
                <div class="w-12 h-12 rounded-full bg-zinc-800 flex items-center justify-center font-bold text-gray-500">${c.name.charAt(0)}</div>
                <div class="flex-1">
                    <div class="fb-comment-bubble">
                        <div class="font-bold text-red-600 text-sm mb-1">${c.name}</div>
                        <p class="text-sm">${c.text}</p>
                        ${c.image_url ? `<img src="${c.image_url}" class="mt-3 rounded-lg max-w-[200px] border border-white/10" onclick="zoomImage('${c.image_url}')">` : ''}
                    </div>
                </div>
            </div>
        `).join('');
    }

    function renderProducts() {
        const grid = document.getElementById('products-grid');
        grid.innerHTML = PRODUCTS.map(p => `
            <div class="product-card">
                <div class="image-box">
                    ${p.isBox ? `
                        <div class="box-icon-container" onclick="openBoxModal()">
                            <i class="fas fa-box-open"></i>
                        </div>
                    ` : `
                        <img src="${p.img}" onclick="zoomImage('${p.img}')">
                        <div class="price-badge">${p.price} AED</div>
                    `}
                </div>
                <div class="p-10">
                    <h3 class="text-3xl font-black italic mb-4">${state.lang === 'ar' ? p.name : p.nameEn}</h3>
                    <p class="text-gray-400 mb-8 h-12 text-sm">${state.lang === 'ar' ? p.info : p.infoEn}</p>
                    <button onclick="${p.isBox ? 'openBoxModal()' : `addToCart(${p.id})`}" class="w-full btn-premium py-5 rounded-2xl">
                        ${p.isBox ? 'صمم بوكسك' : 'إضافة للسلة'}
                    </button>
                </div>
            </div>
        `).join('');
    }

    function addToCart(id) {
        const p = PRODUCTS.find(prod => prod.id === id);
        const exists = state.cart.find(i => i.id === id && !i.isCustomBox);
        if(exists) exists.qty++; else state.cart.push({...p, qty: 1});
        updateUI(); openCart();
    }

    function updateUI() {
        localStorage.setItem('rapid_pro_cart', JSON.stringify(state.cart));
        document.getElementById('cart-dot').innerText = state.cart.reduce((a, b) => a + b.qty, 0);
        const total = state.cart.reduce((a, b) => a + (b.price * b.qty), 0);
        document.getElementById('cart-total').innerText = `${total} AED`;
        
        const content = document.getElementById('cart-content');
        content.innerHTML = state.cart.map((item, idx) => `
            <div class="bg-white/5 p-6 rounded-[30px] flex gap-6 items-center">
                <div class="w-20 h-20 bg-zinc-800 rounded-xl flex items-center justify-center">
                    ${item.isCustomBox ? '<i class="fas fa-box text-3xl"></i>' : `<img src="${item.img}" class="w-full h-full object-cover rounded-xl">`}
                </div>
                <div class="flex-1">
                    <h4 class="font-bold">${item.name}</h4>
                    <div class="flex justify-between items-center mt-2">
                        <div class="flex gap-4"><button onclick="changeQty(${idx},-1)">-</button><span>${item.qty}</span><button onclick="changeQty(${idx},1)">+</button></div>
                        <span class="text-red-600">${item.price * item.qty} AED</span>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function changeQty(idx, d) { state.cart[idx].qty += d; if(state.cart[idx].qty < 1) state.cart.splice(idx,1); updateUI(); }
    
    function openBoxModal() {
        state.boxSelection = {};
        PRODUCTS.filter(p => !p.isBox).forEach(p => state.boxSelection[p.id] = 0);
        const list = document.getElementById('box-options-list');
        list.innerHTML = PRODUCTS.filter(p => !p.isBox).map(p => `
            <div class="flex justify-between items-center bg-black/40 p-6 rounded-3xl border border-white/5">
                <span class="font-bold">${p.name}</span>
                <div class="flex items-center gap-6">
                    <button onclick="updateBoxItem(${p.id},-1)" class="w-10 h-10 bg-zinc-800 rounded-full">-</button>
                    <span id="box-qty-${p.id}">0</span>
                    <button onclick="updateBoxItem(${p.id},1)" class="w-10 h-10 bg-red-600 rounded-full">+</button>
                </div>
            </div>
        `).join('');
        document.getElementById('box-modal').classList.remove('hidden');
        document.getElementById('box-modal').classList.add('flex');
        updateBoxCounter();
    }

    function updateBoxItem(id, d) {
        const total = Object.values(state.boxSelection).reduce((a,b)=>a+b,0);
        if(d>0 && total>=12) return;
        if(d<0 && state.boxSelection[id]<=0) return;
        state.boxSelection[id] += d;
        document.getElementById(`box-qty-${id}`).innerText = state.boxSelection[id];
        updateBoxCounter();
    }

    function updateBoxCounter() {
        const total = Object.values(state.boxSelection).reduce((a,b)=>a+b,0);
        document.getElementById('box-counter').innerText = 12 - total;
        document.getElementById('confirm-box-btn').style.opacity = total === 12 ? '1' : '0.4';
    }

    function confirmBoxSelection() {
        if(Object.values(state.boxSelection).reduce((a,b)=>a+b,0) < 12) return;
        let details = [];
        for(let id in state.boxSelection) { if(state.boxSelection[id]>0) details.push(`${PRODUCTS.find(p=>p.id==id).name}(${state.boxSelection[id]})`); }
        state.cart.push({ id: Date.now(), name: "بوكس مخصص", price: 150, qty: 1, details: details.join(', '), isCustomBox: true });
        closeBoxModal(); updateUI(); openCart();
    }

    function openSidebar() { document.getElementById('sidebar').classList.add('active-left'); document.getElementById('master-overlay').classList.remove('hidden'); }
    function openCart() { document.getElementById('cart-panel').classList.add('active-right'); document.getElementById('master-overlay').classList.remove('hidden'); }
    function closePanels() { document.getElementById('sidebar').classList.remove('active-left'); document.getElementById('cart-panel').classList.remove('active-right'); document.getElementById('master-overlay').classList.add('hidden'); }
    function closeBoxModal() { document.getElementById('box-modal').classList.add('hidden'); }
    function closeCheckout() { document.getElementById('checkout-modal').classList.add('hidden'); }
    function navigate(id) { document.getElementById(id).scrollIntoView({behavior:'smooth'}); closePanels(); }
    function zoomImage(src) { document.getElementById('full-img').src = src; document.getElementById('image-overlay').classList.remove('hidden'); }
    function showCheckout() { document.getElementById('checkout-modal').classList.remove('hidden'); document.getElementById('checkout-modal').classList.add('flex'); }

    function handleFinalSubmit(e) {
        e.preventDefault();
        let msg = `طلب جديد\nالاسم: ${document.getElementById('c-name').value}\nالهاتف: ${document.getElementById('c-phone').value}\nالمدينة: ${document.getElementById('c-city').value}\n\n`;
        state.cart.forEach(i => msg += `- ${i.name} x ${i.qty}${i.details? ` (${i.details})`:''}\n`);
        window.open(`https://wa.me/971508851549?text=${encodeURIComponent(msg)}`);
    }

    function toggleTheme() { document.body.classList.toggle('light-mode'); }
    function toggleLang() { state.lang = state.lang==='ar'?'en':'ar'; renderProducts(); updateUI(); }

    window.onload = init;
</script>
</body>
</html>
