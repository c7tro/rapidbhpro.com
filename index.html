<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAPID BH PRO | Official Store</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        :root {
            --primary: #e63946;
            --gold: #c5a028;
            --dark: #000000;
            --card: #0a0a0a;
            --glass: rgba(15, 15, 15, 0.85);
            --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        body {
            background-color: var(--dark);
            color: #fff;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
            transition: all 0.3s ease;
        }

        /* تنسيق الخطوط بناءً على اللغة */
        [lang="ar"] { font-family: 'Tajawal', sans-serif; }
        [lang="en"] { font-family: 'Montserrat', sans-serif; }

        .hero-section {
            height: 100vh;
            width: 100%;
            position: relative;
            background-image: linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(0,0,0,0.9)), 
                              url('https://i.ibb.co/9kCQjSsy/IMG-7517.jpg');
            background-size: cover;
            background-position: center 20%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .glass-nav {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .side-panel {
            position: fixed;
            top: 0;
            height: 100vh;
            width: 400px;
            background: var(--glass);
            backdrop-filter: blur(30px);
            z-index: 10000;
            transition: var(--transition);
        }
        #sidebar { left: -450px; border-right: 1px solid var(--gold); }
        #cart-panel { right: -450px; border-left: 1px solid var(--primary); }
        
        /* ضبط اتجاه القوائم عند تغيير اللغة */
        html[dir="ltr"] #sidebar { left: auto; right: -450px; border-left: 1px solid var(--gold); border-right: none; }
        html[dir="ltr"] #cart-panel { right: auto; left: -450px; border-right: 1px solid var(--primary); border-left: none; }

        .side-panel.active-panel { left: 0 !important; right: auto !important; }
        html[dir="ltr"] .side-panel.active-panel { right: 0 !important; left: auto !important; }

        .btn-premium {
            background: linear-gradient(45deg, var(--primary), #b91c1c);
            transition: var(--transition);
        }
        .btn-premium:active { transform: scale(0.95); }

        .product-card {
            background: var(--card);
            border: 1px solid #1a1a1a;
            border-radius: 35px;
            transition: var(--transition);
        }
        .product-card:hover { border-color: var(--primary); transform: translateY(-10px); }

        .image-box {
            height: 320px;
            border-radius: 30px;
            margin: 10px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .image-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .lang-btn {
            background: rgba(255,255,255,0.1);
            padding: 8px 15px;
            border-radius: 12px;
            font-weight: 900;
            font-size: 14px;
            border: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body class="antialiased">

<nav class="fixed top-0 w-full z-[1000] py-6 px-8 transition-all" id="nav">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
        <button onclick="toggleSidebar(true)" class="text-2xl"><i class="fas fa-bars-staggered"></i></button>
        
        <div class="text-xl font-black italic tracking-tighter">RAPID BH<span class="text-red-600">PRO</span></div>
        
        <div class="flex items-center gap-5">
            <button onclick="toggleLanguage()" class="lang-btn" id="lang-toggle-text">EN</button>
            <button onclick="toggleCart(true)" class="relative">
                <i class="fas fa-shopping-bag text-2xl"></i>
                <span id="cart-dot" class="absolute -top-1 -right-1 bg-red-600 w-5 h-5 rounded-full text-[10px] flex items-center justify-center font-bold">0</span>
            </button>
        </div>
    </div>
</nav>

<aside id="sidebar" class="side-panel p-10 flex flex-col">
    <div class="flex justify-between items-center mb-16">
        <span class="text-gold font-bold uppercase tracking-widest" id="nav-label">Navigation</span>
        <button onclick="toggleSidebar(false)" class="text-4xl">&times;</button>
    </div>
    <nav class="flex flex-col gap-8 text-3xl font-black italic">
        <div onclick="navigate('hero')" class="hover:text-red-600 cursor-pointer" id="m-home">الرئيسية</div>
        <div onclick="navigate('store')" class="hover:text-red-600 cursor-pointer" id="m-store">المتجر</div>
        <div onclick="contactWA()" class="text-red-600 cursor-pointer" id="m-support">الدعم</div>
    </nav>
</aside>

<aside id="cart-panel" class="side-panel flex flex-col">
    <div class="p-10 border-b border-white/5 flex justify-between items-center">
        <h2 class="text-2xl font-black italic" id="cart-title">السلة</h2>
        <button onclick="toggleCart(false)" class="text-4xl">&times;</button>
    </div>
    <div id="cart-items-box" class="flex-1 overflow-y-auto p-6 space-y-4"></div>
    <div class="p-8 bg-black/50 border-t border-white/10">
        <div class="flex justify-between text-xl font-black mb-6">
            <span id="total-label">الإجمالي:</span>
            <span id="total-price" class="text-gold">0 AED</span>
        </div>
        <button onclick="showCheckout()" class="w-full btn-premium py-5 rounded-2xl font-black text-xl" id="checkout-btn">إتمام الطلب</button>
    </div>
</aside>

<div id="master-overlay" class="fixed inset-0 bg-black/80 hidden z-[9999]" onclick="closeAllPanels()"></div>

<section id="hero" class="hero-section">
    <div class="px-6 animate__animated animate__fadeIn">
        <h4 class="text-gold text-lg font-bold tracking-[6px] mb-4 uppercase" id="hero-sub">Since 2022</h4>
        <h1 class="text-7xl md:text-[120px] font-black italic mb-8 leading-none">RAPID <span class="text-red-600">BH</span></h1>
        <p class="max-w-xl mx-auto text-lg text-gray-300 mb-10" id="hero-desc">خبراء النظافة والتعطير في الإمارات. قوتنا في جودتنا.</p>
        <button onclick="navigate('store')" class="btn-premium px-12 py-5 rounded-full font-black text-xl" id="hero-btn">تسوق الآن</button>
    </div>
</section>

<section id="store" class="py-24 px-8">
    <div class="max-w-7xl mx-auto">
        <h2 class="text-5xl font-black italic mb-16 text-center" id="store-title">المتجر</h2>
        <div id="p-grid" class="grid grid-cols-1 md:grid-cols-3 gap-10"></div>
    </div>
</section>

<footer class="bg-black py-16 px-8 border-t border-white/5 text-center">
    <h2 class="text-3xl font-black italic mb-6 text-red-600">RAPID BH PRO</h2>
    <div class="max-w-md mx-auto mb-8 space-y-3 text-gray-400 font-bold">
        <p><i class="fas fa-phone-alt text-red-600 ml-2"></i> +971 50 885 1549</p>
        <p><i class="fas fa-envelope text-red-600 ml-2"></i> support@rapidbhpro.com</p>
    </div>
    <p class="text-[10px] text-gray-700 tracking-[5px]">COPYRIGHT © 2026 RAPID BH PRO</p>
</footer>

<script>
    // نظام الترجمة
    const i18n = {
        ar: {
            lang: 'EN',
            home: 'الرئيسية',
            store: 'المتجر',
            support: 'الدعم',
            heroDesc: 'خبراء النظافة والتعطير في الإمارات. قوتنا في جودتنا.',
            heroBtn: 'تسوق الآن',
            storeTitle: 'المتجر',
            cartTitle: 'السلة',
            total: 'الإجمالي:',
            checkout: 'إتمام الطلب',
            add: 'إضافة للسلة',
            empty: 'السلة فارغة',
            orderMsg: 'طلب جديد من الموقع 🚚'
        },
        en: {
            lang: 'AR',
            home: 'Home',
            store: 'Store',
            support: 'Support',
            heroDesc: 'Experts in Cleaning & Fragrances in UAE. Our strength is our quality.',
            heroBtn: 'Shop Now',
            storeTitle: 'The Store',
            cartTitle: 'My Cart',
            total: 'Total:',
            checkout: 'Checkout Now',
            add: 'Add to Cart',
            empty: 'Cart is empty',
            orderMsg: 'New Order from Website 🚚'
        }
    };

    let currentLang = 'ar';

    const DB = [
        { id: 1, name: {ar: "معطر عود ملكي", en: "Royal Oud Perfume"}, price: 15, img: "https://i.ibb.co/9mSytFrM/IMG-7278.jpg" },
        { id: 2, name: {ar: "معطر الفخامة", en: "Luxury Scent"}, price: 15, img: "https://i.ibb.co/YF8sD3p2/IMG-7285.jpg" },
        { id: 3, name: {ar: "مزيل بقع BH 99", en: "Stain Remover BH 99"}, price: 15, img: "https://i.ibb.co/3mcb1trt/IMG-7284.jpg" },
        { id: 7, name: {ar: "بوكس التوفير (12 حبة)", en: "Saving Box (12 Pcs)"}, price: 150, img: "https://i.ibb.co/KzxfrNkC/IMG-7281.jpg", isBox: true }
    ];

    let cart = [];

    function toggleLanguage() {
        currentLang = currentLang === 'ar' ? 'en' : 'ar';
        document.documentElement.lang = currentLang;
        document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
        updateUI();
    }

    function updateUI() {
        const t = i18n[currentLang];
        document.getElementById('lang-toggle-text').innerText = t.lang;
        document.getElementById('m-home').innerText = t.home;
        document.getElementById('m-store').innerText = t.store;
        document.getElementById('m-support').innerText = t.support;
        document.getElementById('hero-desc').innerText = t.heroDesc;
        document.getElementById('hero-btn').innerText = t.heroBtn;
        document.getElementById('store-title').innerText = t.storeTitle;
        document.getElementById('cart-title').innerText = t.cartTitle;
        document.getElementById('total-label').innerText = t.total;
        document.getElementById('checkout-btn').innerText = t.checkout;
        renderProducts();
        renderCart();
    }

    function renderProducts() {
        const grid = document.getElementById('p-grid');
        grid.innerHTML = DB.map(p => `
            <div class="product-card p-6">
                <div class="image-box bg-zinc-900 mb-6">
                    <img src="${p.img}" class="rounded-2xl">
                </div>
                <h3 class="text-2xl font-black mb-2">${p.name[currentLang]}</h3>
                <div class="flex justify-between items-center mt-6">
                    <span class="text-2xl font-black text-gold">${p.price} AED</span>
                    <button onclick="addToCart(${p.id})" class="btn-premium px-6 py-2 rounded-xl font-bold">
                        ${i18n[currentLang].add}
                    </button>
                </div>
            </div>
        `).join('');
    }

    function addToCart(id) {
        const p = DB.find(x => x.id === id);
        const exists = cart.find(i => i.id === id);
        if(exists) exists.qty++; else cart.push({...p, qty: 1});
        updateCartCount();
        renderCart();
        // Toast
        const msg = currentLang === 'ar' ? 'تمت الإضافة' : 'Added to cart';
        console.log(msg);
    }

    function renderCart() {
        const box = document.getElementById('cart-items-box');
        let total = 0;
        if(cart.length === 0) {
            box.innerHTML = `<div class="text-center py-10 opacity-30">${i18n[currentLang].empty}</div>`;
        } else {
            box.innerHTML = cart.map((item, idx) => {
                total += (item.price * item.qty);
                return `
                <div class="flex gap-4 bg-zinc-900/50 p-3 rounded-2xl border border-white/5">
                    <img src="${item.img}" class="w-16 h-16 rounded-lg object-cover">
                    <div class="flex-1">
                        <h4 class="font-bold text-sm">${item.name[currentLang]}</h4>
                        <div class="flex justify-between items-center mt-2">
                            <span class="text-gold font-black">${item.price * item.qty} AED</span>
                            <div class="flex items-center gap-3 bg-black px-2 py-1 rounded-lg">
                                <button onclick="changeQty(${idx}, -1)">-</button>
                                <span class="text-red-600 font-bold">${item.qty}</span>
                                <button onclick="changeQty(${idx}, 1)">+</button>
                            </div>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }
        document.getElementById('total-price').innerText = `${total} AED`;
    }

    function changeQty(idx, delta) {
        cart[idx].qty += delta;
        if(cart[idx].qty <= 0) cart.splice(idx, 1);
        renderCart();
        updateCartCount();
    }

    function updateCartCount() {
        document.getElementById('cart-dot').innerText = cart.reduce((a, b) => a + b.qty, 0);
    }

    function toggleSidebar(show) {
        const s = document.getElementById('sidebar');
        const o = document.getElementById('master-overlay');
        if(show) { s.classList.add('active-panel'); o.classList.remove('hidden'); }
        else { s.classList.remove('active-panel'); o.classList.add('hidden'); }
    }

    function toggleCart(show) {
        const c = document.getElementById('cart-panel');
        const o = document.getElementById('master-overlay');
        if(show) { c.classList.add('active-panel'); o.classList.remove('hidden'); renderCart(); }
        else { c.classList.remove('active-panel'); o.classList.add('hidden'); }
    }

    function closeAllPanels() { toggleSidebar(false); toggleCart(false); }

    function navigate(id) {
        document.getElementById(id).scrollIntoView({ behavior: 'smooth' });
        closeAllPanels();
    }

    function contactWA() { window.open('https://wa.me/971508851549', '_blank'); }

    function showCheckout() {
        if(cart.length === 0) return;
        let total = 0;
        let msg = `${i18n[currentLang].orderMsg}\n\n`;
        cart.forEach(i => {
            msg += `- ${i.name[currentLang]} x${i.qty} = ${i.price * i.qty} AED\n`;
            total += (i.price * i.qty);
        });
        msg += `\nTotal: ${total} AED`;
        window.open(`https://wa.me/971508851549?text=${encodeURIComponent(msg)}`, '_blank');
    }

    // Initialize
    updateUI();
    window.addEventListener('scroll', () => {
        const n = document.getElementById('nav');
        if(window.scrollY > 50) n.classList.add('glass-nav', 'py-4');
        else n.classList.remove('glass-nav', 'py-4');
    });
</script>
</body>
</html>
