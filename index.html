<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAPID BH PRO | المتجر الرسمي</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        :root {
            --primary: #e63946;
            --gold: #c5a028;
            --dark: #000000;
            --card: #0a0a0a;
            --glass: rgba(15, 15, 15, 0.85);
            --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            --fb-bg: #242526;
            --fb-bubble: #3a3b3c;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--dark);
            color: #fff;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        @media (max-width: 768px) {
            .hero-title { font-size: 4rem !important; }
            .product-grid { grid-template-columns: 1fr !important; gap: 2rem !important; }
            .side-panel { width: 85% !important; }
        }

        .hero-section {
            height: 100vh;
            width: 100%;
            position: relative;
            background-image: linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(0,0,0,0.9)), 
                              url('https://i.ibb.co/9kCQjSsy/IMG-7517.jpg');
            background-size: cover;
            background-position: center 20%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .glass-nav {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .side-panel {
            position: fixed;
            top: 0;
            height: 100vh;
            width: 400px;
            background: var(--glass);
            backdrop-filter: blur(30px);
            z-index: 10000;
            transition: var(--transition);
            box-shadow: 0 0 40px rgba(0,0,0,1);
        }
        #sidebar { left: -450px; border-right: 1px solid var(--gold); }
        #cart-panel { right: -450px; border-left: 1px solid var(--primary); }
        
        /* التحكم في الاتجاه عند تغيير اللغة */
        html[lang="en"] #sidebar { left: auto; right: -450px; border-left: 1px solid var(--gold); }
        html[lang="en"] #cart-panel { right: auto; left: -450px; border-right: 1px solid var(--primary); }

        .side-panel.active-left { left: 0 !important; }
        .side-panel.active-right { right: 0 !important; }
        html[lang="en"] .side-panel.active-left { right: 0 !important; left: auto !important; }
        html[lang="en"] .side-panel.active-right { left: 0 !important; right: auto !important; }

        .btn-premium {
            background: linear-gradient(45deg, var(--primary), #b91c1c);
            transition: var(--transition);
        }

        .product-card {
            background: var(--card);
            border: 1px solid #1a1a1a;
            border-radius: 35px;
            transition: var(--transition);
        }
        .product-card:hover { border-color: var(--primary); transform: translateY(-10px); }

        .image-box {
            height: 320px;
            border-radius: 30px;
            margin: 10px;
            overflow: hidden;
            position: relative;
            cursor: zoom-in;
        }
        .image-box img { width: 100%; height: 100%; object-fit: cover; transition: 0.8s; }

        .lang-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 5px 12px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .lang-btn:hover { background: var(--primary); }
    </style>
</head>
<body>

<div id="image-overlay" class="img-fullscreen fixed inset-0 z-[99999] bg-black/95 hidden flex items-center justify-center" onclick="this.classList.add('hidden')">
    <img src="" id="full-img" class="max-w-[90%] max-h-[90%] rounded-2xl">
</div>

<nav class="fixed top-0 w-full z-[1000] py-6 px-8 transition-all" id="nav">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
        <button onclick="openSidebar()" class="text-3xl"><i class="fas fa-bars-staggered"></i></button>
        <div class="text-2xl font-black font-['Montserrat'] italic">RAPID BH<span class="text-red-600">PRO</span></div>
        <div class="flex items-center gap-4">
            <button onclick="toggleLang()" class="lang-btn" id="lang-btn-text">EN</button>
            <button onclick="openCart()" class="relative">
                <i class="fas fa-shopping-bag text-3xl"></i>
                <span id="cart-dot" class="absolute -top-1 -right-1 bg-red-600 w-5 h-5 rounded-full text-[10px] flex items-center justify-center font-bold">0</span>
            </button>
        </div>
    </div>
</nav>

<aside id="sidebar" class="side-panel p-10 flex flex-col">
    <div class="flex justify-between items-center mb-16 pt-10">
        <span class="text-gold font-bold italic tracking-widest uppercase" id="nav-label">Navigation</span>
        <button onclick="closePanels()" class="text-5xl">&times;</button>
    </div>
    <nav class="flex flex-col gap-10 text-4xl font-black italic">
        <div onclick="navigate('hero')" class="hover:text-red-600 cursor-pointer transition" id="m-home">الرئيسية</div>
        <div onclick="navigate('store')" class="hover:text-red-600 cursor-pointer transition" id="m-store">المتجر</div>
        <div onclick="contactWA()" class="text-red-600 cursor-pointer transition" id="m-support">الدعم</div>
    </nav>
</aside>

<aside id="cart-panel" class="side-panel flex flex-col">
    <div class="p-10 border-b border-white/5 flex justify-between items-center">
        <h2 class="text-3xl font-black italic" id="cart-title">السلة</h2>
        <button onclick="closePanels()" class="text-5xl">&times;</button>
    </div>
    <div id="cart-items-box" class="flex-1 overflow-y-auto p-6 space-y-6"></div>
    <div class="p-10 bg-black/50 border-t border-white/10">
        <div class="flex justify-between text-2xl font-black mb-8">
            <span id="total-label">الإجمالي:</span>
            <span id="total-price" class="text-gold">0 AED</span>
        </div>
        <button onclick="showCheckout()" class="w-full btn-premium py-6 rounded-3xl font-black text-2xl shadow-xl" id="checkout-btn">إتمام الطلب</button>
    </div>
</aside>

<div id="master-overlay" class="fixed inset-0 bg-black/80 hidden z-[9999]" onclick="closePanels()"></div>

<section id="hero" class="hero-section">
    <div class="px-6">
        <h4 class="text-gold text-xl font-bold tracking-[8px] mb-6 uppercase">Since 2022</h4>
        <h1 class="hero-title text-8xl md:text-[160px] font-black italic mb-10 leading-none">RAPID <span class="text-red-600">BH</span></h1>
        <p class="max-w-2xl mx-auto text-lg md:text-2xl text-gray-300 font-medium mb-12" id="hero-desc">خبراء النظافة والتعطير في الإمارات. قوتنا في جودتنا.</p>
        <button onclick="navigate('store')" class="btn-premium px-16 py-6 rounded-full font-black text-2xl" id="hero-btn">تسوق الآن</button>
    </div>
</section>

<section id="store" class="py-32 px-8">
    <div class="max-w-7xl mx-auto">
        <h2 class="text-6xl font-black italic mb-20 text-center" id="store-title">المتجر</h2>
        <div id="p-grid" class="product-grid grid grid-cols-1 md:grid-cols-3 gap-12"></div>
    </div>
</section>

<footer class="bg-black py-20 px-8 border-t border-white/5 text-center">
    <h2 class="text-4xl font-black italic mb-10 text-red-600">RAPID BH PRO</h2>
    <div class="max-w-md mx-auto mb-10 space-y-4 text-gray-400 font-bold">
        <p><i class="fas fa-phone-alt text-red-600 ml-2"></i> +971 50 885 1549</p>
        <p><i class="fas fa-envelope text-red-600 ml-2"></i> support@rapidbhpro.com</p>
    </div>
    <p class="text-xs text-gray-800 font-bold uppercase tracking-[10px]">Copyright © 2026 RAPID BH PRO</p>
</footer>

<script>
    // بيانات اللغة
    const translations = {
        ar: {
            btn: 'EN',
            home: 'الرئيسية',
            store: 'المتجر',
            support: 'الدعم',
            heroDesc: 'خبراء النظافة والتعطير في الإمارات. قوتنا في جودتنا.',
            heroBtn: 'تسوق الآن',
            storeTitle: 'المتجر',
            cartTitle: 'السلة',
            total: 'الإجمالي:',
            checkout: 'إتمام الطلب',
            navLabel: 'Navigation'
        },
        en: {
            btn: 'AR',
            home: 'Home',
            store: 'Store',
            support: 'Support',
            heroDesc: 'Cleaning and fragrance experts in UAE. Quality is our strength.',
            heroBtn: 'Shop Now',
            storeTitle: 'The Store',
            cartTitle: 'Cart',
            total: 'Total:',
            checkout: 'Checkout',
            navLabel: 'Menu'
        }
    };

    let currentLang = 'ar';

    const DB = [
        { id: 1, name: "معطر عود ملكي", price: 15, img: "https://i.ibb.co/9mSytFrM/IMG-7278.jpg" },
        { id: 2, name: "معطر الفخامة", price: 15, img: "https://i.ibb.co/YF8sD3p2/IMG-7285.jpg" },
        { id: 3, name: "معطر زهور بيضاء", price: 15, img: "https://i.ibb.co/V0nJW4CY/IMG-7280.jpg" },
        { id: 4, name: "معطر فواكه", price: 15, img: "https://i.ibb.co/Y7B86C54/IMG-7279.jpg" },
        { id: 5, name: "مزيل بقع BH 99", price: 15, img: "https://i.ibb.co/3mcb1trt/IMG-7284.jpg" },
        { id: 6, name: "مزيل الدهون والشحوم الحروقه", price: 15, img: "https://i.ibb.co/KzxfrNkC/IMG-7281.jpg" },
        { id: 7, name: "بوكس التوفير (12 عبوة)", price: 150, isBox: true, icon: 'fas fa-box-open' }
    ];

    let cart = JSON.parse(localStorage.getItem('RAPID_ELITE_CART')) || [];

    function toggleLang() {
        currentLang = currentLang === 'ar' ? 'en' : 'ar';
        document.documentElement.lang = currentLang;
        document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
        
        const t = translations[currentLang];
        document.getElementById('lang-btn-text').innerText = t.btn;
        document.getElementById('m-home').innerText = t.home;
        document.getElementById('m-store').innerText = t.store;
        document.getElementById('m-support').innerText = t.support;
        document.getElementById('hero-desc').innerText = t.heroDesc;
        document.getElementById('hero-btn').innerText = t.heroBtn;
        document.getElementById('store-title').innerText = t.storeTitle;
        document.getElementById('cart-title').innerText = t.cartTitle;
        document.getElementById('total-label').innerText = t.total;
        document.getElementById('checkout-btn').innerText = t.checkout;
        document.getElementById('nav-label').innerText = t.navLabel;
    }

    function renderProducts() {
        const grid = document.getElementById('p-grid');
        grid.innerHTML = DB.map(p => `
            <div class="product-card">
                <div class="image-box" onclick="${p.isBox ? '' : `zoomImg('${p.img}')`}">
                    ${p.isBox ? `<i class="${p.icon} text-8xl text-gold"></i>` : `<img src="${p.img}">`}
                </div>
                <div class="p-8">
                    <h3 class="text-3xl font-black italic mb-4">${p.name}</h3>
                    <div class="flex justify-between items-center">
                        <span class="text-3xl font-black text-gold">${p.price} AED</span>
                        <button onclick="addToCart(${p.id})" class="btn-premium px-6 py-3 rounded-2xl font-bold">
                            <i class="fas fa-plus"></i>
                        </button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function addToCart(id) {
        const p = DB.find(x => x.id === id);
        const exists = cart.find(i => i.id === id);
        if(exists) exists.qty++; else cart.push({...p, qty: 1});
        save(); updateCartCount();
    }

    function renderCart() {
        const box = document.getElementById('cart-items-box');
        let total = 0;
        if(cart.length === 0) box.innerHTML = `<div class="text-center py-20 opacity-20">السلة فارغة</div>`;
        else {
            box.innerHTML = cart.map((item, idx) => {
                total += (item.price * item.qty);
                return `<div class="bg-zinc-900 p-4 rounded-3xl flex gap-4">
                    ${item.isBox ? '<i class="fas fa-box-open text-3xl text-gold p-4"></i>' : `<img src="${item.img}" class="w-16 h-16 rounded-xl">`}
                    <div class="flex-1">
                        <h4 class="font-bold text-sm">${item.name}</h4>
                        <div class="flex justify-between items-center mt-2">
                            <div class="flex gap-4 bg-black px-3 py-1 rounded-lg">
                                <span onclick="changeQty(${idx}, -1)" class="cursor-pointer">-</span>
                                <span class="text-red-600 font-bold">${item.qty}</span>
                                <span onclick="changeQty(${idx}, 1)" class="cursor-pointer">+</span>
                            </div>
                            <span class="text-gold font-black">${item.price * item.qty} AED</span>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }
        document.getElementById('total-price').innerText = `${total} AED`;
    }

    function changeQty(idx, delta) { cart[idx].qty += delta; if(cart[idx].qty <= 0) cart.splice(idx, 1); save(); renderCart(); updateCartCount(); }
    function save() { localStorage.setItem('RAPID_ELITE_CART', JSON.stringify(cart)); }
    function updateCartCount() { document.getElementById('cart-dot').innerText = cart.reduce((a, b) => a + b.qty, 0); }
    function openSidebar() { document.getElementById('sidebar').classList.add('active-left'); document.getElementById('master-overlay').classList.remove('hidden'); }
    function openCart() { document.getElementById('cart-panel').classList.add('active-right'); document.getElementById('master-overlay').classList.remove('hidden'); renderCart(); }
    function closePanels() { document.getElementById('sidebar').classList.remove('active-left'); document.getElementById('cart-panel').classList.remove('active-right'); document.getElementById('master-overlay').classList.add('hidden'); }
    function navigate(id) { document.getElementById(id).scrollIntoView({ behavior: 'smooth' }); closePanels(); }
    function zoomImg(url) { document.getElementById('full-img').src = url; document.getElementById('image-overlay').classList.remove('hidden'); }
    function contactWA() { window.open('https://wa.me/971508851549', '_blank'); }

    function showCheckout() {
        if(cart.length === 0) return;
        let msg = `طلب جديد:\n`;
        let total = 0;
        cart.forEach(i => { msg += `- ${i.name} x${i.qty} = ${i.price * i.qty} AED\n`; total += (i.price * i.qty); });
        msg += `\nالإجمالي: ${total} AED`;
        window.open(`https://wa.me/971508851549?text=${encodeURIComponent(msg)}`, '_blank');
    }

    window.addEventListener('scroll', () => {
        const n = document.getElementById('nav');
        if(window.scrollY > 50) n.classList.add('glass-nav', 'py-4');
        else n.classList.remove('glass-nav', 'py-4');
    });

    renderProducts();
    updateCartCount();
</script>
</body>
</html>
